name: PR Approval Rules
on:
  pull_request_review

jobs:
  validate-approval:
    runs-on: ubuntu-latest
    if: github.event.review.state == 'APPROVED'
    steps:
      - name: Check approval permissions
        run: |
          OWNER="amitgaikwad2837"
          REVIEWER="${{ github.event.review.user.login }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          
          echo "PR Author: $PR_AUTHOR"
          echo "Reviewer: $REVIEWER"
          echo "Repo Owner: $OWNER"
          
          # Allow owner to self-approve
          if [[ "$REVIEWER" == "$OWNER" ]]; then
            echo "✅ Owner self-approval allowed"
            exit 0
          fi
          
          # Block others from self-approving
          if [[ "$REVIEWER" == "$PR_AUTHOR" ]]; then
            echo "❌ Error: Only the repo owner can self-approve PRs"
            exit 1
          fi
          
          # Allow non-authors to approve
          echo "✅ Approval allowed"
          exit 0
